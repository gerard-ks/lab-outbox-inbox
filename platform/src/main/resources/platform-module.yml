
app:
  messaging:
    nats:
      server: nats://localhost:4222
      connection-timeout: 5s
      reconnect-wait: 2s
      socket-write-timeout: 3s
      request-timeout: 3s
    outbox:
      batch-size: 100
      max-retries: 5
    stream:
      name: MODULAR_MONOLITH_EVENTS
      subjects:
        - "events.>"
    chaos:
        simulate-doublon: false # Si true : Empêche l'Outbox de passer à SENT (Pour le Test 2)